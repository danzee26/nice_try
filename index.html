<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Page</title>
</head>

<body>

  <table border="1" cellpadding="10" cellspacing="0" width="600" align="center">
    <tr>
      <td colspan="2" align="center">
        <h2>Название товара</h2>
      </td>
    </tr>

    <tr>
      <td width="300" align="center">
        <img src="https://via.placeholder.com/250" alt="Product Image">
      </td>
      <td>
        <p><strong>Цена:</strong> $99</p>
        <button>Купить</button>
      </td>
    </tr>

    <tr>
      <td colspan="2">
        <p>
          Описание товара: здесь будет подробное описание продукта.
          Можно рассказать характеристики, преимущества и особенности.
        </p>
      </td>
    </tr>
  </table>

</body>

</html>
