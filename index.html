<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>  
  
    <div class="container border border-black mt-4" style="width: 600px;">
      <div class="row border-bottom border-black py-3">
        <div class="col-12 text-center">
          <h2>Название товара</h2>
        </div>
      </div>
      <div class="row">
        <div class="col-md-7 d-flex justify-content-center border-end border-black">
          <img class="img-fluid rounded py-2 w-75" src="assets/img/image1.jpg" alt="Product Image">
        </div>
        <div class="col-md-5 mb-3 mb-md-0 d-flex flex-column align-items-center justify-content-center">
          <p class="h2"><strong>Цена: </strong>99$</p>
          <button class="btn-primary btn mt-2">Купить</button>
        </div>
      </div>
      <div class="row border-top border-black justify-content-center">
        <div class="col-md-8 pt-2">
          <p>Описание товара: здесь будет подробное описание продукта.
              Можно рассказать характеристики, преимущества и особенности.</p>
        </div>
      </div>
    </div>
  
</body>

</html>
