<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

  <div class="container mt-5">
    <div class="border border-black text-center">
      <div class="row g-0 border-bottom border-black">
        <div class="col py-3">
          <h1 class="mb-0">Название товара</h1>
        </div>
      </div>
    
    <div class="row g-0 border-bottom border-black">
      <div class="col-7 border-end border-black align-items-center justify-content-center">
        <img src="https://via.placeholder.com/250" alt="Product Image">
      </div>
      <div class="col-5">
        <p class="h4"><strong>Цена:</strong> 99$</p>
        <button class="btn-primary">Купить</button>
      </div>
    </div>
      <div>
        <div>
          <p>Описание товара: здесь будет подробное описание продукта.
          Можно рассказать характеристики, преимущества и особенности.</p>
        </div>
      </div>
    </div>
  </div>

  <table border="1" cellpadding="10" cellspacing="0" width="600" align="center">
    <tr>
      <td colspan="2" align="center">
        <h2>Название товара</h2>
      </td>
    </tr>

    <tr>
      <td width="300" align="center">
        <img src="https://via.placeholder.com/250" alt="Product Image">
      </td>
      <td>
        <p><strong>Цена:</strong> $99</p>
        <button>Купить</button>
      </td>
    </tr>

    <tr>
      <td colspan="2">
        <p>
          Описание товара: здесь будет подробное описание продукта.
          Можно рассказать характеристики, преимущества и особенности.
        </p>
      </td>
    </tr>
  </table>

</body>

</html>
